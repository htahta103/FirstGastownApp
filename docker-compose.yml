services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todoflow
      POSTGRES_PASSWORD: todoflow
      POSTGRES_DB: todoflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://todoflow:todoflow@db:5432/todoflow?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - api

volumes:
  pgdata:
