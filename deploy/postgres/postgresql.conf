# TodoFlow — Postgres 16 tuning for containerized production.
# Mount via docker-compose.prod.yml and tune for your host RAM/CPU.

listen_addresses = '*'
max_connections = 100
shared_buffers = 128MB
effective_cache_size = 512MB
maintenance_work_mem = 64MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 4MB
min_wal_size = 80MB
max_wal_size = 1GB
log_min_duration_statement = 1000
log_line_prefix = '%m [%p] '
