# TodoFlow — Nginx reverse proxy (TLS via Let's Encrypt / certbot).
#
# Install:
#   1. Replace every example.com with your real hostname (or use sed).
#   2. sudo install -m 644 deploy/nginx/todoflow.conf /etc/nginx/sites-available/todoflow
#   3. sudo ln -sf /etc/nginx/sites-available/todoflow /etc/nginx/sites-enabled/
#   4. Point SPA assets at /var/www/todoflow/static (sync your Vite build output).
#   5. sudo mkdir -p /var/www/certbot && sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot certonly --webroot -w /var/www/certbot -d example.com --email you@example.com --agree-tos
#   7. Uncomment the HTTPS server block below, set ssl_certificate paths, nginx -t && reload.
#   8. Optionally: sudo certbot install --cert-name example.com (or use certbot renew + deploy/nginx/reload-hook.sh).

upstream todoflow_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP — ACME challenges + redirect to HTTPS (enable redirect after TLS works).
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

