# Production-style stack: Postgres (tuned config) + Go API + Nginx (static + /api proxy).
# Usage from repo root:
#   docker compose -f docker-compose.prod.yml up --build
# App: http://localhost (port 80). API is internal; browser uses same-origin /api/... .

networks:
  default:
    name: todoflow_prod
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todoflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoflow}
      POSTGRES_DB: ${POSTGRES_DB:-todoflow}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://todoflow:todoflow@db:5432/todoflow?sslmode=disable}
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata_prod:
