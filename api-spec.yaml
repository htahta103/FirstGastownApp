openapi: "3.1.0"
info:
  title: TodoFlow API
  version: "1.0.0"
  description: |
    RESTful API for TodoFlow — a premium todo application.
    Anonymous identity via X-User-Id header (UUID v4).

servers:
  - url: /api
    description: Relative to application root

# ---------------------------------------------------------------------------
# Security: anonymous user identity
# ---------------------------------------------------------------------------
# Every request MUST include the X-User-Id header. The backend middleware
# validates UUID format and scopes all data to that user.

components:
  parameters:
    UserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Anonymous user identity (UUID v4 from localStorage)

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [NOT_FOUND, VALIDATION_ERROR, BAD_REQUEST, INTERNAL_ERROR]
            message:
              type: string
            details:
              type: object
          required: [code, message]

    Project:
      type: object
      properties:
        id:    { type: string, format: uuid }
        name:  { type: string, maxLength: 100 }
        icon:  { type: string, maxLength: 50 }
        color: { type: string, maxLength: 7, description: "Hex color e.g. #3B82F6" }
        task_count:    { type: integer }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:  { type: string, maxLength: 100 }
        icon:  { type: string, maxLength: 50 }
        color: { type: string, maxLength: 7 }

    Task:
      type: object
      properties:
        id:          { type: string, format: uuid }
        project_id:  { type: string, format: uuid }
        title:       { type: string, maxLength: 500 }
        description: { type: string, nullable: true }
        due_date:    { type: string, format: date, nullable: true }
        priority:    { type: string, enum: [urgent, high, medium, low] }
        status:      { type: string, enum: [todo, in_progress, done] }
        position:    { type: number, format: double }
        subtask_total:     { type: integer }
        subtask_completed: { type: integer }
        tags:
          type: array
          items: { $ref: "#/components/schemas/Tag" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    TaskInput:
      type: object
      required: [project_id, title]
      properties:
        project_id:  { type: string, format: uuid }
        title:       { type: string, maxLength: 500 }
        description: { type: string, nullable: true }
        due_date:    { type: string, format: date, nullable: true }
        priority:    { type: string, enum: [urgent, high, medium, low], default: medium }
        status:      { type: string, enum: [todo, in_progress, done], default: todo }

    TaskUpdate:
      type: object
      properties:
        project_id:  { type: string, format: uuid }
        title:       { type: string, maxLength: 500 }
        description: { type: string, nullable: true }
        due_date:    { type: string, format: date, nullable: true }
        priority:    { type: string, enum: [urgent, high, medium, low] }
        status:      { type: string, enum: [todo, in_progress, done] }

    PositionUpdate:
      type: object
      required: [position]
      properties:
        position: { type: number, format: double }
        status:   { type: string, enum: [todo, in_progress, done], description: "Set when dragging between board columns" }

    Subtask:
      type: object
      properties:
        id:         { type: string, format: uuid }
        task_id:    { type: string, format: uuid }
        title:      { type: string, maxLength: 500 }
        completed:  { type: boolean }
        position:   { type: number, format: double }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SubtaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 500 }

    Tag:
      type: object
      properties:
        id:    { type: string, format: uuid }
        name:  { type: string, maxLength: 50 }
        color: { type: string, maxLength: 7 }

    TagInput:
      type: object
      required: [name]
      properties:
        name:  { type: string, maxLength: 50 }
        color: { type: string, maxLength: 7 }

    Dashboard:
      type: object
      properties:
        total_tasks:       { type: integer }
        completed_today:   { type: integer }
        overdue_count:     { type: integer }
        project_progress:
          type: array
          items:
            type: object
            properties:
              project_id:   { type: string, format: uuid }
              project_name: { type: string }
              total:        { type: integer }
              completed:    { type: integer }
        recent_activity:
          type: array
          items:
            type: object
            properties:
              id:        { type: string, format: uuid }
              action:    { type: string, enum: [created, updated, completed] }
              task_title: { type: string }
              timestamp: { type: string, format: date-time }
        upcoming_deadlines:
          type: array
          items: { $ref: "#/components/schemas/Task" }

    SavedFilter:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string, maxLength: 100 }
        filter_json: { type: object, description: "Serialized filter criteria" }
        created_at:  { type: string, format: date-time }

    SavedFilterInput:
      type: object
      required: [name, filter_json]
      properties:
        name:        { type: string, maxLength: 100 }
        filter_json: { type: object }

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # --- Users (auto-provision) ---
  /users:
    post:
      summary: Create or retrieve anonymous user
      description: |
        Idempotent upsert. If the user_id already exists, returns it.
        Called once on first app load.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200": { description: "User exists or created" }

  # --- Projects ---
  /projects:
    get:
      summary: List all projects for user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Array of projects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
    post:
      summary: Create a project
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectInput" }
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    get:
      summary: Get project by ID
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      summary: Update project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectInput" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
    delete:
      summary: Delete project (cascades to tasks, subtasks, task_tags)
      responses:
        "204": { description: "Deleted" }

  # --- Tasks ---
  /tasks:
    get:
      summary: List tasks with filtering
      parameters:
        - $ref: "#/components/parameters/UserId"
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [todo, in_progress, done] }
        - name: priority
          in: query
          schema: { type: string, enum: [urgent, high, medium, low] }
        - name: tag_id
          in: query
          schema: { type: string, format: uuid }
        - name: due_from
          in: query
          schema: { type: string, format: date }
        - name: due_to
          in: query
          schema: { type: string, format: date }
        - name: sort
          in: query
          schema: { type: string, enum: [position, due_date, priority, created_at], default: position }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items: { $ref: "#/components/schemas/Task" }
                  total: { type: integer }
    post:
      summary: Create a task
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskInput" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "422":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    get:
      summary: Get task with subtasks and tags
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    put:
      summary: Update task fields
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Delete task (cascades to subtasks, task_tags)
      responses:
        "204": { description: "Deleted" }

  /tasks/{id}/position:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    patch:
      summary: Update task position (drag-and-drop reorder/column move)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PositionUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  # --- Subtasks ---
  /tasks/{taskId}/subtasks:
    parameters:
      - name: taskId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    get:
      summary: List subtasks for a task
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Subtask" }
    post:
      summary: Create a subtask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubtaskInput" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subtask" }

  /subtasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    put:
      summary: Update subtask title
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubtaskInput" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subtask" }
    delete:
      summary: Delete subtask
      responses:
        "204": { description: "Deleted" }

  /subtasks/{id}/toggle:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    patch:
      summary: Toggle subtask completed state
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subtask" }

  # --- Tags ---
  /tags:
    get:
      summary: List all tags for user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tag" }
    post:
      summary: Create a tag
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TagInput" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    put:
      summary: Update tag
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TagInput" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
    delete:
      summary: Delete tag (removes from all task associations)
      responses:
        "204": { description: "Deleted" }

  # --- Task-Tag associations ---
  /tasks/{taskId}/tags/{tagId}:
    parameters:
      - name: taskId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: tagId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    post:
      summary: Attach tag to task
      responses:
        "204": { description: "Tag attached" }
    delete:
      summary: Detach tag from task
      responses:
        "204": { description: "Tag detached" }

  # --- Dashboard ---
  /dashboard:
    get:
      summary: Aggregated dashboard data
      description: |
        Returns: total tasks, completed today, overdue count, per-project
        progress, recent activity (last 20 events), upcoming deadlines
        (tasks due in next 7 days).
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dashboard" }

  # --- Search ---
  /search:
    get:
      summary: Full-text search across tasks
      parameters:
        - $ref: "#/components/parameters/UserId"
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Task" }

  # --- Saved Filters ---
  /filters:
    get:
      summary: List saved filters
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SavedFilter" }
    post:
      summary: Save a filter preset
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavedFilterInput" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedFilter" }

  /filters/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/UserId"
    put:
      summary: Update saved filter
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavedFilterInput" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedFilter" }
    delete:
      summary: Delete saved filter
      responses:
        "204": { description: "Deleted" }
