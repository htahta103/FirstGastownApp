<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TodoFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">TodoFlow</div>
      <div class="header-actions">
        <label class="field-inline">
          <span class="sr-only">Project</span>
          <select id="project-select" aria-label="Project"></select>
        </label>
        <div class="view-toggle" role="tablist" aria-label="View mode">
          <button type="button" id="btn-list" class="view-btn is-active" role="tab" aria-selected="true">List</button>
          <button type="button" id="btn-board" class="view-btn" role="tab" aria-selected="false">Board</button>
        </div>
      </div>
    </header>

    <main class="main">
      <section id="toolbar" class="toolbar">
        <input type="text" id="new-task-title" placeholder="Quick add task…" aria-label="New task title" />
        <button type="button" id="btn-add-task" class="btn-primary">Add</button>
        <button type="button" id="btn-new-project" class="btn-ghost" title="Create project">+ Project</button>
      </section>

      <p id="status-msg" class="status-msg" role="status" aria-live="polite"></p>

      <section id="view-list" class="view-panel" aria-labelledby="btn-list">
        <ul id="task-list" class="task-list"></ul>
      </section>

      <section id="view-board" class="view-panel is-hidden" aria-labelledby="btn-board">
        <div class="board" id="board">
          <div class="column" data-status="todo" data-label="Todo">
            <h2 class="column-title">Todo</h2>
            <div class="column-body" data-drop-zone="todo"></div>
          </div>
          <div class="column" data-status="in_progress" data-label="In progress">
            <h2 class="column-title">In progress</h2>
            <div class="column-body" data-drop-zone="in_progress"></div>
          </div>
          <div class="column" data-status="done" data-label="Done">
            <h2 class="column-title">Done</h2>
            <div class="column-body" data-drop-zone="done"></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/app.js" defer></script>
</body>
</html>
