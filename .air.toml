# https://github.com/air-verse/air — used by Dockerfile.dev / docker compose api service
root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/server"
  delay = 500
  exclude_dir = ["tmp", "vendor", "web", ".git", "deploy"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"

[log]
  main_only = false
  silent = false

[misc]
  clean_on_exit = true
