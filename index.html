<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('todoflow-ui')
          var theme = 'dark'
          if (raw) {
            var j = JSON.parse(raw)
            if (j && j.state && j.state.theme === 'light') theme = 'light'
          }
          document.documentElement.classList.toggle('dark', theme !== 'light')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>TodoFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-gray-950 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
